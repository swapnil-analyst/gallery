<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Event Gallery</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        /* UPLOAD BOX */
        .upload-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-box input {
            padding: 10px;
            color: white;
        }

        .upload-box button {
            padding: 10px 20px;
            background: #ff4b5c;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .upload-box button:hover {
            background: #ff2d42;
        }

        /* GALLERY GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .card img {
            width: 100%; 
            height: 180px;
            object-fit: cover;
        }
        .card:hover {
            transform: scale(1.02);
        }

            /* 3 DOT MENU */
        .menu {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            z-index: 10;
        }

        .menu span {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 50%;
            font-size: 20px;
        }

        /* DROPDOWN */
        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background: #222;
            border-radius: 10px;
            min-width: 130px;
            z-index: 999;
            overflow: hidden;
        }

        .dropdown button, .dropdown a {
            display: block;
            width: 100%;
            padding: 10px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            text-decoration: none;
        }

        .dropdown button:hover,
        .dropdown a:hover {
            background: #333;
        }

    </style>
</head>

<body>

<div class="header-bar">
    <div class="title">📸 {{ event.name }}</div>
    <a href="/logout" class="logout-btn">🚪 Logout</a>
</div>

<p>{{ count }} Photos</p>
<button onclick="copyLink()">🔗 Copy Event Link</button>

<script>
function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("Link Copied!");
}
</script>

<!-- UPLOAD -->
<div class="upload-box">
    <form action="/upload/{{ event_id }}" method="POST" enctype="multipart/form-data">
        <input type="file" name="images" multiple>
        <button type="submit">Upload</button>
    </form>
</div>

<!-- GALLERY -->
<div class="gallery">

    {% for image in images %}
    <div class="card">

        <img src="{{ url_for('static', filename='images/' + event_id + '/' + image) }}">

        <!-- MENU -->
        <div class="menu">
            <span onclick="toggleMenu(event, this)">⋮</span>

            <div class="dropdown">

                <!-- VIEW -->
                <a href="{{ url_for('static', filename='images/' + event_id + '/' + image) }}" target="_blank">
                    View
                </a>

                <!-- DOWNLOAD -->
                <a href="{{ url_for('static', filename='images/' + event_id + '/' + image) }}" download>
                    Download
                </a>

                <!-- DELETE -->
                <a href="/delete/{{ event_id }}/{{ image }}">
                    Delete
                </a>
            </div>
        </div>

    </div>
    {% endfor %}

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
